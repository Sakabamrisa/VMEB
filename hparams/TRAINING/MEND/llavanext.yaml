# Model
device: 0

name: llava-hf/LLaVA-NeXT-Video-7B-hf-DPO
model_name: LLaVA-NeXT-Video
model_class: LlavaNextVideoForConditionalGeneration
tokenizer_class: LlamaTokenizerFast
tokenizer_name: llava-hf/LLaVA-NeXT-Video-7B-hf-DPO
inner_params:
- model.language_model.model.layers.30.mlp.gate_proj.weight
- model.language_model.model.layers.30.mlp.up_proj.weight
- model.language_model.model.layers.30.mlp.down_proj.weight
- model.language_model.model.layers.31.mlp.gate_proj.weight
- model.language_model.model.layers.31.mlp.up_proj.weight
- model.language_model.model.layers.31.mlp.down_proj.weight
- model.language_model.model.layers.30.self_attn.q_proj.weight
- model.language_model.model.layers.30.self_attn.k_proj.weight
- model.language_model.model.layers.30.self_attn.v_proj.weight
- model.language_model.model.layers.30.self_attn.o_proj.weight
- model.language_model.model.layers.31.self_attn.q_proj.weight
- model.language_model.model.layers.31.self_attn.k_proj.weight
- model.language_model.model.layers.31.self_attn.v_proj.weight
- model.language_model.model.layers.31.self_attn.o_proj.weight

# Method
alg: MEND
lr: 1e-6
edit_lr: 1e-4
lr_lr: 1e-4
seed: 42
cedit: 0.1
iedit: 0.1
cloc: 1.0
cbase: 1.0
dropout: 0.0
train_base: False
no_grad_layers: null
one_sided: False
n_hidden: 1
hidden_dim: null
init: id
norm: False  #是否使用归一化
combine: True
x_only: False
delta_only: False
act: relu
rank: 1920
mlp_class: IDMLP
shared: True
archive: null

# Train
batch_size: 1
model_save_pt: 5000
silent: False
#max_epochs: 1
max_iters: 50000
log_interval: 100
eval_log_interval: 1000
final_eval: True
val_interval: 5000
early_stop_patience: 5000
early_stop_key: "loss/total_edit_val"
eval_only: False
half: False
debug: False
save: False
verbose: True

val_batch_size: 1
accumulate_bs: 2
val_steps: 500
opt: Adam
grad_clip: 100.

# Output
results_dir: ./results

# Multimodal
qformer_checkpoint: null
qformer_name_or_path: null
state_dict_file: null
pretrained_ckpt: null

# image
coco_image: dataset/my_videos
rephrase_image: dataset/my_videos